<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Stylized hand-drawn-like mini animation from a photo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400&display=swap" rel="stylesheet">
<style>
  body {
    margin: 0;
    padding: 2rem;
    font-family: system-ui, sans-serif;
    background: #e9e9e9;
    color: #111;
  }
  h1 {
    text-align: center;
    font-weight: 400;
    margin: 0 0 2rem;
    font-family: "Work Sans", sans-serif;
  }
  .note {
    text-align: center;
    font-size: 0.85rem;
    color: #666;
    margin-top: 1.5rem;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 1rem;
    max-width: 1000px;
    margin: 0 auto;
  }
  .grid img {
    width: 100%;
    border-radius: 3px;
  }
</style>
</head>
<body>
  <h1>Stylized hand-drawn-like animation from photos</h1>
  <div class="grid">
    <img src="img/ektar.png" alt="">
    <img src="img/portra.png" alt="">
    <img src="img/bodie.png" alt="">
    <img src="img/agfa.png" alt="">
  </div>
  <p class="note">(If images aren't animating, try a newer browser)</p>
</body>
</html>
